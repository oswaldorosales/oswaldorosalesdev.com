name: Build & Push Docker Image (GHCR)

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      no-cache:
        description: "Skip cache (full rebuild)"
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enable Docker Buildx (required for cache mounts)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true

          tags: |
            ghcr.io/${{ github.repository_owner }}/oswaldorosalesdev:latest
            ghcr.io/${{ github.repository_owner }}/oswaldorosalesdev:${{ github.sha }}

          # GitHub Actions cache for Docker layers
          cache-from: type=gha
          cache-to: type=gha,mode=max

          no-cache: ${{ github.event.inputs.no-cache == 'true' }}
