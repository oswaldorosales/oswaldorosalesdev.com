name: Build & Push Docker Image (GHCR)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Skip cache (full rebuild)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: 
          no-cache: true
          pull: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oswaldorosalesdev:latest
            ghcr.io/${{ github.repository_owner }}/oswaldorosalesdev:${{ github.sha }}